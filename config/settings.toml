# Personal Assistant Configuration

[general]
name = "My AI Assistant"
timezone = "UTC"
language = "en"

[llm]
# OpenRouter configuration
provider = "openrouter"
base_url = "https://openrouter.ai/api/v1"
# API key from environment: OPENROUTER_API_KEY

# Model routing
meta_model = "google/gemma-4-26b-a4b-it:free"
reasoning_model = "google/gemma-4-26b-a4b-it:free"
embedding_model = "qwen/qwen3-embedding-8b"

# Rate limiting (free tier)
rate_limit_per_minute = 60
rate_limit_per_day = 1000

# Retry settings
max_retries = 3
retry_base_delay = 1.0

[storage]
# Qdrant vector DB
qdrant_host = "localhost"
qdrant_port = 6333
qdrant_collection = "personal-assistant-kb"

# SQLite user memory
memory_db = "./data/memory.db"

# Graph stores
citation_graph_db = "./data/citations.db"
knowledge_graph_db = "./data/concepts.db"

[ingest]
# GitHub connector
github_enabled = true
# Token from environment: GITHUB_TOKEN
github_poll_interval_minutes = 15

# arXiv connector
arxiv_enabled = true
arxiv_categories = ["cs.AI", "cs.LG", "cs.CL"]
arxiv_max_results = 50

[agents]
# Enable/disable agents
meta_agent = true
interest_agent = true
research_agent = true
opportunity_agent = true
brainstorming_agent = true

[topics]
# Seed topics for interest modeling
seed_topics = [
    "artificial intelligence",
    "machine learning",
    "software engineering",
    "python",
    "distributed systems",
]

[daemon]
# Daemon service configuration
check_interval_seconds = 60       # How often to check for updates (60s)
ingest_interval_minutes = 15      # How often to run full ingest cycle (15 mins)
log_level = "INFO"                # Logging level: DEBUG, INFO, WARNING, ERROR
log_file = "./data/daemon.log"    # Where to write daemon logs
pid_file = "./data/daemon.pid"    # Where to store daemon PID
state_file = "./data/daemon_state.json"  # Daemon state persistence
