# ============================================================================
# Personal Assistant Configuration Reference
# ============================================================================
#
# IMPORTANT: This file is now for REFERENCE ONLY.
# All configuration is now environment-driven via .env
#
# To configure the application, copy .env.example to .env and edit values.
# This file documents the structure and defaults for reference purposes.
#
# ============================================================================

[general]
name = "My AI Assistant"
timezone = "UTC"
language = "en"

[llm]
provider = "openrouter"
base_url = "https://openrouter.ai/api/v1"
meta_model = "google/gemma-4-26b-a4b-it:free"
reasoning_model = "google/gemma-4-26b-a4b-it:free"
embedding_model = "qwen/qwen3-embedding-8b"
rate_limit_per_minute = 60
rate_limit_per_day = 1000
max_retries = 3
retry_base_delay = 1.0

[storage]
qdrant_host = "localhost"
qdrant_port = 6333
qdrant_collection = "personal-assistant-kb"
knowledge_db = "./data/knowledge.db"

[ingest]
github_enabled = true
github_poll_interval_minutes = 15
arxiv_enabled = true
arxiv_categories = ["cs.AI", "cs.LG", "cs.CL"]
arxiv_max_results = 50

[agents]
meta_agent = true
interest_agent = true
research_agent = true
opportunity_agent = true
brainstorming_agent = true

[agents.interest]
batch_size = 5
min_confidence = 0.6
embedding_cache_enabled = true

[agents.brainstorming]
temperature = 0.7
max_iterations = 5

[knowledge]
quality_threshold = 0.65
auto_embed = false
max_entries_per_user = 1000

[conversation]
session_limit = 100
auto_create = true
persist_across_restarts = true

[topics]
seed_topics = [
    "artificial intelligence",
    "machine learning",
    "software engineering",
    "python",
    "distributed systems",
]

[daemon]
check_interval_seconds = 60
ingest_interval_minutes = 15
log_level = "INFO"
log_file = "./data/daemon.log"
pid_file = "./data/daemon.pid"
state_file = "./data/daemon_state.json"

[connectors.slack]
enabled = false
channels = ["#general"]
include_dms = true

[connectors.browser]
enabled = false
browsers = ["chrome", "firefox"]
track_searches = true
track_page_visits = true
min_time_on_page = 2
exclude_domains = ["localhost", "127.0.0.1"]
