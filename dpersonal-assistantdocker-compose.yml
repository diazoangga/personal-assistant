version: '3.8'

services:
  # Backend service (FastAPI + aiogram + daemon)
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - MINI_APP_URL=${MINI_APP_URL:-http://localhost:5173}
      - TELEGRAM_API_HOST=0.0.0.0
      - TELEGRAM_API_PORT=8000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - KNOWLEDGE_DB_PATH=./data/knowledge.db
      - DAEMON_LOG_FILE=./data/daemon.log
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    networks:
      - personal-assistant

  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - personal-assistant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  qdrant_data:

networks:
  personal-assistant:
    driver: bridge
