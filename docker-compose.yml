version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pa-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./.data/qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Alternative: Use pgvector instead of Qdrant
  # Uncomment if you prefer Postgres + pgvector
  # postgres:
  #   image: pgvector/pgvector:pg16
  #   container_name: pa-postgres
  #   environment:
  #     POSTGRES_PASSWORD: pa_password
  #     POSTGRES_DB: personal_assistant
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - ./.data/pg:/var/lib/postgresql/data
  #   restart: unless-stopped
